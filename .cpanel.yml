---
deployment:
  tasks:
    - export DEPLOY_PATH=/home/tritec/repositories/smartVal
    - export COMPOSER_BIN=/usr/local/bin/composer
    - cd $DEPLOY_PATH && $COMPOSER_BIN install --no-dev --optimize-autoloader
    - cd $DEPLOY_PATH && php artisan optimize:clear
    - cd $DEPLOY_PATH && php artisan config:cache && php artisan route:cache && php artisan view:cache
    - cd $DEPLOY_PATH && php artisan migrate --force
